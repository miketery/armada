<!DOCTYPE html>
<html lang="en" class="bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Armada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <!-- Nav -->
    <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-wider text-amber-400">ARMADA</a>
            <div class="flex items-center gap-6 text-sm">
                <a href="/products.html" class="text-zinc-300 hover:text-white transition">Products</a>
                <a href="/services.html" class="text-zinc-300 hover:text-white transition">Services</a>
                <a href="/login.html" class="px-4 py-2 border border-zinc-600 rounded hover:border-amber-500 hover:text-amber-400 transition">Login</a>
                <a href="/signup.html" class="text-white font-medium">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-6 py-24">
        <h1 class="text-3xl font-bold mb-2 text-center">Create Account</h1>
        <p class="text-zinc-400 text-center mb-8">Get started with Armada today.</p>

        <form id="signup-form" class="space-y-5" onsubmit="handleSignup(event)">
            <div>
                <label for="email" class="block text-sm font-medium text-zinc-300 mb-1.5">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2.5 bg-zinc-900 border border-zinc-700 rounded-lg
                           text-zinc-100 placeholder-zinc-500
                           focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"
                    placeholder="you@example.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">Password</label>
                <input type="password" id="password" name="password" required minlength="8"
                    class="w-full px-4 py-2.5 bg-zinc-900 border border-zinc-700 rounded-lg
                           text-zinc-100 placeholder-zinc-500
                           focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"
                    placeholder="Minimum 8 characters">
            </div>

            <div>
                <label for="confirm-password" class="block text-sm font-medium text-zinc-300 mb-1.5">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm_password" required minlength="8"
                    class="w-full px-4 py-2.5 bg-zinc-900 border border-zinc-700 rounded-lg
                           text-zinc-100 placeholder-zinc-500
                           focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"
                    placeholder="Re-enter your password">
            </div>

            <div id="error-msg" class="hidden text-red-400 text-sm bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3"></div>
            <div id="success-msg" class="hidden text-green-400 text-sm bg-green-400/10 border border-green-400/20 rounded-lg px-4 py-3"></div>

            <button type="submit" id="submit-btn"
                class="w-full py-2.5 bg-amber-500 text-zinc-950 rounded-lg font-semibold
                       hover:bg-amber-400 transition disabled:opacity-50 disabled:cursor-not-allowed">
                Create Account
            </button>
        </form>

        <p class="text-center text-zinc-500 text-sm mt-6">
            Already have an account?
            <a href="/login.html" class="text-amber-400 hover:text-amber-300">Sign in</a>
        </p>
    </div>

    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            const successEl = document.getElementById('success-msg');
            errEl.classList.add('hidden');
            successEl.classList.add('hidden');

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                errEl.textContent = 'Passwords do not match.';
                errEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: password,
                    }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Registration failed');
                }

                successEl.textContent = 'Account created! Redirecting to login...';
                successEl.classList.remove('hidden');
                setTimeout(() => { window.location.href = '/login.html'; }, 1500);
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>

</body>
</html>
